  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.24
  - pandas>=2.0
  - pillow>=10.0
  - opencv>=4.8
  - scikit-learn>=1.3
  - matplotlib>=3.8
  - seaborn>=0.13
  - jupyter
  - ipykernel
  - tqdm
  - requests
  - pyyaml
  - pip
